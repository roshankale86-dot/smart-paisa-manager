<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Paisa Manager - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { 
            background-color: #e2e8f0; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 414px;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .icon {
            font-size: 64px;
            color: #ef4444;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 8px;
        }
        p {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #10b981 100%);
            color: white;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
    </style>
    <script>
        // Intelligent automatic redirect back to safety after 3 seconds
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 3000);
    </script>
</head>
<body>
    <div class="container">
        <div class="icon">🔍</div>
        <h1>Page Not Found</h1>
        <p>We couldn't locate the page you were looking for. Don't worry, your data is safe.</p>
        <p style="font-size: 12px; color: #94a3b8; margin-top: -15px;">Redirecting automatically...</p>
        <a href="index.html" class="btn">Return Home Now</a>
    </div>
</body>
</html>
